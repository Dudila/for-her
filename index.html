<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Для тебя ✨</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
    color: #5a3a4a;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    background: linear-gradient(160deg,
      #ffe4ec 0%,
      #ffd1dc 25%,
      #fcb6c8 50%,
      #e8a5c0 75%,
      #c794b8 100%);
    position: relative;
  }

  /* Soft floating clouds / glow blobs in background */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.5;
    pointer-events: none;
  }
  .blob.b1 { width: 300px; height: 300px; background: #fff5d1; top: 10%; left: 8%; animation: float1 18s ease-in-out infinite; }
  .blob.b2 { width: 250px; height: 250px; background: #ffd6e8; top: 60%; right: 10%; animation: float2 22s ease-in-out infinite; }
  .blob.b3 { width: 200px; height: 200px; background: #d4b3ff; top: 70%; left: 15%; animation: float1 25s ease-in-out infinite reverse; }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(40px, -30px); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-50px, 40px); }
  }

  /* Header / instruction */
  .greeting {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5;
  }
  .greeting h1 {
    font-size: 2.2rem;
    font-weight: normal;
    color: #6b3550;
    text-shadow: 0 2px 8px rgba(255,255,255,0.6);
    margin-bottom: 8px;
    font-style: italic;
  }
  .greeting p {
    font-size: 1rem;
    color: #8b5570;
    opacity: 0.85;
  }

  /* Palm container */
  .palm-area {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    cursor: pointer;
    z-index: 3;
  }

  .palm-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 8px 20px rgba(120, 60, 90, 0.3));
    transition: transform 0.4s ease;
  }
  .palm-area:hover .palm-svg {
    transform: scale(1.05) translateY(-4px);
  }

  /* Pulsing hint ring */
  .hint-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 200px;
    height: 200px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
  }

  /* Ladybug */
  .ladybug {
    position: absolute;
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 10;
    transform-origin: center;
    will-change: transform;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .ladybug.visible { opacity: 1; pointer-events: auto; cursor: pointer; }

  .ladybug-body {
    width: 100%;
    height: 100%;
    transform-origin: center;
  }

  /* Wing flutter when flying */
  .wing {
    transform-origin: 30px 28px;
    animation: flutter 0.08s ease-in-out infinite alternate;
  }
  .ladybug.landed .wing { animation: none; }
  .wing.right { transform-origin: 30px 28px; }

  @keyframes flutter {
    0% { transform: rotateY(0deg) scaleX(1); }
    100% { transform: rotateY(70deg) scaleX(0.5); }
  }

  /* Wish card */
  .wish-card {
    position: absolute;
    bottom: -300px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 450px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 30px 28px;
    box-shadow: 0 20px 60px rgba(120, 60, 90, 0.25);
    text-align: center;
    transition: bottom 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 20;
  }
  .wish-card.show { bottom: 8%; }

  .wish-card .day-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    color: white;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .wish-card .wish-text {
    font-size: 1.15rem;
    line-height: 1.6;
    color: #5a3a4a;
    font-style: italic;
  }
  .wish-card .signature {
    margin-top: 16px;
    font-size: 0.9rem;
    color: #a06080;
  }
  .wish-card .close-btn {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    font-size: 1.4rem;
    color: #b08090;
    cursor: pointer;
    line-height: 1;
  }

  /* Floating hearts */
  .heart {
    position: absolute;
    font-size: 1.6rem;
    pointer-events: none;
    z-index: 15;
    animation: floatUp 1.6s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
    20% { opacity: 1; transform: translate(-50%, -20px) scale(1.2); }
    100% { transform: translate(calc(-50% + var(--dx, 0)), -180px) scale(0.8); opacity: 0; }
  }

  /* Calendar button */
  .calendar-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.85);
    border: none;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.4rem;
    box-shadow: 0 4px 12px rgba(120, 60, 90, 0.2);
    transition: transform 0.2s;
    z-index: 30;
  }
  .calendar-btn:hover { transform: scale(1.1); }

  /* Calendar modal */
  .calendar-modal {
    position: fixed;
    inset: 0;
    background: rgba(90, 50, 70, 0.6);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .calendar-modal.show { display: flex; }

  .calendar-content {
    background: white;
    border-radius: 24px;
    padding: 28px 24px;
    max-width: 480px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
  }
  .calendar-content h2 {
    text-align: center;
    color: #6b3550;
    font-weight: normal;
    margin-bottom: 20px;
    font-style: italic;
  }
  .calendar-list { display: flex; flex-direction: column; gap: 12px; }
  .cal-item {
    padding: 14px 18px;
    border-radius: 14px;
    background: #fff5f8;
    border-left: 4px solid #ffb6c1;
  }
  .cal-item.locked {
    background: #f5f5f5;
    border-left-color: #ddd;
    color: #999;
    font-style: italic;
  }
  .cal-item .cal-day {
    font-weight: bold;
    color: #c44569;
    font-size: 0.85rem;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .cal-item.locked .cal-day { color: #aaa; }
  .cal-item .cal-text { font-size: 1rem; line-height: 1.5; }

  .cal-close {
    display: block;
    margin: 20px auto 0;
    background: linear-gradient(135deg, #ff6b9d, #c44569);
    color: white;
    border: none;
    padding: 10px 30px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 1rem;
  }

  @media (max-width: 600px) {
    .greeting h1 { font-size: 1.6rem; }
    .palm-area { width: 220px; height: 220px; }
  }
</style>
</head>
<body>

  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="greeting">
    <h1>Доброе утро, моя любимая</h1>
    <p>наведи на ладошку, к тебе кое-кто прилетит ✨</p>
  </div>

  <!-- Palm with pulsing hint -->
  <div class="palm-area" id="palm">
    <div class="hint-ring"></div>
    <svg class="palm-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- soft palm/hand cupped shape -->
      <defs>
        <radialGradient id="palmGrad" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#ffe0d0" />
          <stop offset="60%" stop-color="#ffc8b0" />
          <stop offset="100%" stop-color="#e8a890" />
        </radialGradient>
        <radialGradient id="palmCenter" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffefe0" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#ffefe0" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Cupped palm shape -->
      <path d="M 40 110
               Q 30 70, 60 50
               Q 70 35, 85 45
               Q 90 30, 105 38
               Q 115 28, 125 42
               Q 140 35, 148 55
               Q 170 70, 160 110
               Q 165 140, 145 165
               Q 120 185, 100 180
               Q 75 185, 55 165
               Q 35 140, 40 110 Z"
            fill="url(#palmGrad)" stroke="#d49080" stroke-width="1.5"/>
      <!-- Palm lines (gentle creases) -->
      <path d="M 70 95 Q 100 105, 135 95" stroke="#c47868" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M 65 120 Q 100 130, 140 118" stroke="#c47868" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M 80 80 Q 85 110, 80 145" stroke="#c47868" stroke-width="1" fill="none" opacity="0.3"/>
      <!-- Soft glow center -->
      <ellipse cx="100" cy="115" rx="40" ry="35" fill="url(#palmCenter)"/>
    </svg>
  </div>

  <!-- Ladybug -->
  <div class="ladybug" id="ladybug">
    <svg class="ladybug-body" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
      <!-- Shadow under -->
      <ellipse cx="30" cy="52" rx="18" ry="3" fill="rgba(0,0,0,0.15)"/>
      <!-- Body (red dome) -->
      <ellipse cx="30" cy="32" rx="22" ry="20" fill="#d63031" stroke="#2d3436" stroke-width="1.5"/>
      <!-- Center line -->
      <line x1="30" y1="14" x2="30" y2="50" stroke="#2d3436" stroke-width="1.5"/>
      <!-- Spots -->
      <circle cx="20" cy="24" r="3" fill="#2d3436"/>
      <circle cx="40" cy="24" r="3" fill="#2d3436"/>
      <circle cx="18" cy="36" r="2.5" fill="#2d3436"/>
      <circle cx="42" cy="36" r="2.5" fill="#2d3436"/>
      <circle cx="24" cy="44" r="2.5" fill="#2d3436"/>
      <circle cx="36" cy="44" r="2.5" fill="#2d3436"/>
      <!-- Head -->
      <ellipse cx="30" cy="14" rx="10" ry="8" fill="#2d3436"/>
      <!-- Eyes -->
      <circle cx="26" cy="13" r="1.8" fill="white"/>
      <circle cx="34" cy="13" r="1.8" fill="white"/>
      <circle cx="26" cy="13" r="0.9" fill="#2d3436"/>
      <circle cx="34" cy="13" r="0.9" fill="#2d3436"/>
      <!-- Antennae -->
      <path d="M 26 8 Q 22 4, 20 2" stroke="#2d3436" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M 34 8 Q 38 4, 40 2" stroke="#2d3436" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <circle cx="20" cy="2" r="1.2" fill="#2d3436"/>
      <circle cx="40" cy="2" r="1.2" fill="#2d3436"/>
      <!-- Wings (translucent, animated) -->
      <ellipse class="wing left" cx="22" cy="28" rx="14" ry="16" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
      <ellipse class="wing right" cx="38" cy="28" rx="14" ry="16" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
    </svg>
  </div>

  <!-- Wish card -->
  <div class="wish-card" id="wishCard">
    <button class="close-btn" id="closeWish">×</button>
    <div class="day-badge" id="dayBadge">ДЕНЬ 1</div>
    <p class="wish-text" id="wishText"></p>
    <p class="signature">— с любовью 💗</p>
  </div>

  <!-- Calendar button -->
  <button class="calendar-btn" id="calBtn" title="Прошлые пожелания">📖</button>

  <!-- Calendar modal -->
  <div class="calendar-modal" id="calModal">
    <div class="calendar-content">
      <h2>Все наши дни ✨</h2>
      <div class="calendar-list" id="calList"></div>
      <button class="cal-close" id="calClose">закрыть</button>
    </div>
  </div>

<script>
  // ---------- 10 wishes ----------
  const WISHES = [
    "Пусть этот день начнётся с улыбки, а закончится мыслью о том, как сильно тебя любят. Ты — самое тёплое, что есть в моей жизни.",
    "Сегодня ты особенно красивая. Впрочем, как и вчера. И как будешь завтра. Я тобой горжусь — просто за то, что ты есть.",
    "Желаю тебе, чтобы каждая мелочь сегодня радовала: солнечный луч, любимый кофе, случайная мысль обо мне. Я рядом, даже если не вижу тебя сейчас.",
    "Ты делаешь мир мягче. Пусть и мир сегодня будет к тебе мягким — без спешки, без тревог, только то, что согревает.",
    "Помни: ты сильнее, чем думаешь, и любимее, чем чувствуешь. Я выбираю тебя каждый день заново — и это самое лёгкое решение.",
    "Сегодня твой день — без причины, просто потому что ты в нём. Пусть он принесёт что-то маленькое, но настоящее. Я тебя обнимаю.",
    "Знаешь, что мне сегодня хочется? Чтобы ты улыбнулась прямо сейчас. Получилось? Тогда мой план на день удался. Люблю тебя.",
    "Ты — моя любимая мысль с утра и последняя перед сном. Пусть твой день будет таким же тёплым, какими ты делаешь мои.",
    "Если устанешь — отдохни. Если загрустишь — вспомни, что я где-то думаю о тебе именно в эту секунду. Ты не одна. Никогда.",
    "Десять дней пролетели, а я люблю тебя в десять раз сильнее. Спасибо, что ты есть. Спасибо, что выбрала меня. Я твой."
  ];

  // ---------- Day index (cycles 1..10) ----------
  // Anchor date = first day she opens the page (stored in localStorage)
  function getDayNumber() {
    const KEY = 'ladybug_start_date';
    let start = localStorage.getItem(KEY);
    if (!start) {
      start = new Date().toDateString();
      localStorage.setItem(KEY, start);
    }
    const startMs = new Date(start).getTime();
    const today = new Date();
    today.setHours(0,0,0,0);
    const diffDays = Math.floor((today.getTime() - startMs) / (1000*60*60*24));
    return (diffDays % WISHES.length) + 1; // 1..10
  }

  // ---------- Mark day as seen ----------
  function markSeen(day) {
    const seen = JSON.parse(localStorage.getItem('ladybug_seen') || '[]');
    if (!seen.includes(day)) {
      seen.push(day);
      localStorage.setItem('ladybug_seen', JSON.stringify(seen));
    }
  }

  // ---------- Audio: gentle buzzing via Web Audio API ----------
  let audioCtx = null;
  let buzzNodes = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function startBuzz() {
    initAudio();
    if (buzzNodes) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();

    osc.type = 'sawtooth';
    osc.frequency.value = 180;
    gain.gain.value = 0;
    gain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.3);

    lfo.frequency.value = 12;          // wing-beat tremolo
    lfoGain.gain.value = 0.025;
    lfo.connect(lfoGain).connect(gain.gain);

    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    lfo.start();
    buzzNodes = { osc, gain, lfo };
  }

  function stopBuzz() {
    if (!buzzNodes) return;
    const { osc, gain, lfo } = buzzNodes;
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    setTimeout(() => { osc.stop(); lfo.stop(); }, 350);
    buzzNodes = null;
  }

  function kissSound() {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  // ---------- Ladybug flight ----------
  const ladybug = document.getElementById('ladybug');
  const palm = document.getElementById('palm');
  let flying = false;
  let landed = false;
  let leaving = false;

  function getPalmCenter() {
    const r = palm.getBoundingClientRect();
    return { x: r.left + r.width/2 - 30, y: r.top + r.height/2 - 30 };
  }

  function getStartPos() {
    // Enter from one of the corners randomly
    const corners = [
      { x: -80, y: window.innerHeight * 0.2 },
      { x: window.innerWidth + 30, y: window.innerHeight * 0.3 },
      { x: -80, y: window.innerHeight * 0.7 },
      { x: window.innerWidth + 30, y: window.innerHeight * 0.6 },
    ];
    return corners[Math.floor(Math.random() * corners.length)];
  }

  // Bezier interpolation for curved flight
  function bezier(t, p0, p1, p2) {
    const u = 1 - t;
    return {
      x: u*u*p0.x + 2*u*t*p1.x + t*t*p2.x,
      y: u*u*p0.y + 2*u*t*p1.y + t*t*p2.y,
    };
  }

  function animateFlight(from, to, duration, onDone) {
    // Control point: somewhere above midpoint for graceful arc
    const mid = {
      x: (from.x + to.x) / 2 + (Math.random() - 0.5) * 200,
      y: Math.min(from.y, to.y) - 120 - Math.random() * 80,
    };
    const start = performance.now();

    function frame(now) {
      const t = Math.min(1, (now - start) / duration);
      // ease in-out
      const e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
      const pos = bezier(e, from, mid, to);
      // tangent for rotation
      const ahead = bezier(Math.min(1, e + 0.02), from, mid, to);
      const angle = Math.atan2(ahead.y - pos.y, ahead.x - pos.x) * 180 / Math.PI + 90;
      // small bobbing
      const bob = Math.sin(now * 0.02) * 4;
      ladybug.style.transform = `translate(${pos.x}px, ${pos.y + bob}px) rotate(${angle}deg)`;
      if (t < 1) requestAnimationFrame(frame);
      else onDone && onDone();
    }
    requestAnimationFrame(frame);
  }

  function flyIn() {
    if (flying || landed) return;
    flying = true;
    const from = getStartPos();
    const to = getPalmCenter();
    ladybug.style.transform = `translate(${from.x}px, ${from.y}px)`;
    ladybug.classList.add('visible');
    ladybug.classList.remove('landed');
    startBuzz();
    animateFlight(from, to, 1800, () => {
      flying = false;
      landed = true;
      ladybug.classList.add('landed');
      stopBuzz();
      // settle position cleanly
      ladybug.style.transform = `translate(${to.x}px, ${to.y}px) rotate(0deg)`;
    });
  }

  function flyAway() {
    if (!landed || leaving) return;
    leaving = true;
    landed = false;
    ladybug.classList.remove('landed');
    const from = getPalmCenter();
    // exit upward toward random corner
    const to = {
      x: Math.random() < 0.5 ? -100 : window.innerWidth + 50,
      y: -120 - Math.random() * 100,
    };
    startBuzz();
    animateFlight(from, to, 1600, () => {
      ladybug.classList.remove('visible');
      stopBuzz();
      leaving = false;
    });
  }

  // ---------- Hearts burst ----------
  function burstHearts(x, y) {
    const symbols = ['💗','❤️','💕','💖','✨'];
    for (let i = 0; i < 8; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      h.style.left = x + 'px';
      h.style.top = y + 'px';
      h.style.setProperty('--dx', ((Math.random() - 0.5) * 200) + 'px');
      h.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 2200);
    }
  }

  // ---------- Show wish ----------
  const wishCard = document.getElementById('wishCard');
  const wishText = document.getElementById('wishText');
  const dayBadge = document.getElementById('dayBadge');

  function showWish() {
    const day = getDayNumber();
    wishText.textContent = WISHES[day - 1];
    dayBadge.textContent = `ДЕНЬ ${day}`;
    wishCard.classList.add('show');
    markSeen(day);
  }

  document.getElementById('closeWish').addEventListener('click', () => {
    wishCard.classList.remove('show');
  });

  // ---------- Events ----------
  palm.addEventListener('mouseenter', flyIn);
  palm.addEventListener('touchstart', flyIn, { passive: true });

  ladybug.addEventListener('click', (e) => {
    if (!landed) return;
    const rect = ladybug.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    burstHearts(cx, cy);
    kissSound();
    showWish();
    setTimeout(flyAway, 600);
  });

  // ---------- Calendar ----------
  const calBtn = document.getElementById('calBtn');
  const calModal = document.getElementById('calModal');
  const calList = document.getElementById('calList');
  const calClose = document.getElementById('calClose');

  calBtn.addEventListener('click', () => {
    const seen = JSON.parse(localStorage.getItem('ladybug_seen') || '[]');
    const today = getDayNumber();
    calList.innerHTML = '';
    WISHES.forEach((wish, i) => {
      const day = i + 1;
      const isSeen = seen.includes(day);
      const div = document.createElement('div');
      div.className = 'cal-item' + (isSeen ? '' : ' locked');
      div.innerHTML = `
        <div class="cal-day">ДЕНЬ ${day}${day === today ? ' • сегодня' : ''}</div>
        <div class="cal-text">${isSeen ? wish : '🔒 откроется в свой день'}</div>
      `;
      calList.appendChild(div);
    });
    calModal.classList.add('show');
  });

  calClose.addEventListener('click', () => calModal.classList.remove('show'));
  calModal.addEventListener('click', (e) => {
    if (e.target === calModal) calModal.classList.remove('show');
  });

  // Pre-init audio on first user interaction (browsers require this)
  document.addEventListener('click', initAudio, { once: true });
  document.addEventListener('touchstart', initAudio, { once: true });
</script>
</body>
</html>
